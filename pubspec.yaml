name: powersync_dart
description: Workspace root for the PowerSync Dart SDK.
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

workspace:
  - packages/powersync
  - packages/powersync_attachments_helper
  - packages/powersync_flutter_libs

  - demos/benchmarks
  - demos/django-todolist
  - demos/firebase-nodejs-todolist
  - demos/supabase-anonymous-auth
  - demos/supabase-edge-function-auth
  - demos/supabase-simple-chat
  - demos/supabase-todolist
  - demos/supabase-todolist-drift
  - demos/supabase-todolist-optional-sync
  - demos/supabase-trello

dependencies:
  lints: ^6.1.0
  melos: ^7.5.0
  test: ^1.25.0
  path: ^1.0.0
  yaml: ^3.1.2

dependency_overrides:
  # The only drift version with support for version 3.x of the sqlite3 package
  # needs this analyzer, but riverpod doesn't support it yet:
  # https://github.com/rrousselGit/riverpod/pull/4680
  analyzer: ^10.0.0

melos:
  repository: https://github.com/powersync-ja/powersync.dart
  command:
    version:
      changelog: false
      packageFilters:
        noPrivate: true
      hooks:
        # Automatically update libraryVersion:
        preCommit: |
          dart run tool/update_version.dart
          git add packages/powersync/lib/src/version.dart

  scripts:
    prepare:
      description: Download and prepare assets for demos
      run: |
        melos bootstrap && melos run prepare:assets && dart ./tool/compile_webworker.dart && melos run prepare:demos

    prepare:demos:
      description: Download SQLite3 wasm for demos
      run: dart run powersync:setup_web --no-worker
      exec:
        concurrency: 1
      packageFilters:
        private: true
        dirExists: web
        dependsOn: powersync

    prepare:assets:
      description: Download Sqlite3 WASM for tests
      run: dart ./bin/setup_web.dart --no-worker --output-dir ../powersync/assets
      exec:
        concurrency: 1
      packageFilters:
        scope: powersync

    test:
      description: Run tests in a specific package.
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        dirExists:
          - test
        dependsOn: test
      # This tells Melos tests to ignore env variables passed to tests from `melos run test`
      # as they could change the behaviour of how tests filter packages.
      env:
        MELOS_TEST: true

    test:web:
      description: Run web tests in a specific package.
      run: dart test -p chrome --concurrency=1
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: test
        dirExists:
          - test
      env:
        MELOS_TEST: true
