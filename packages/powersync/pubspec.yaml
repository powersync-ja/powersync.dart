name: powersync
version: 2.0.2
homepage: https://powersync.com
repository: https://github.com/powersync-ja/powersync.dart
description: PowerSync Dart and Flutter SDK. Sync Postgres, MongoDB, MySQL or SQL Server with SQLite in your app
resolution: workspace
environment:
  sdk: ^3.6.0

dependencies:
  sqlite_async: ^0.14.0
  sqlite3_web: ^0.7.0
  sqlite3: ^3.2.0
  meta: ^1.0.0
  http: ^1.6.0
  uuid: ^4.2.0
  async: ^2.10.0
  logging: ^1.1.1
  collection: ^1.19.0
  web: ^1.0.0

  # These packages don't do anything, but we specifically don't want users
  # on older versions since we use build hooks to bundle native code now.
  powersync_flutter_libs: ^0.5.0+eol
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlcipher_flutter_libs: ^0.7.0+eol

  # Only used internally to download WASM / worker files.
  args: ^2.6.0
  pub_semver: ^2.0.0
  pubspec_parse: ^1.3.0
  path: ^1.8.0
  typed_data: ^1.4.0
  code_assets: ^1.0.0
  crypto: ^3.0.7
  hooks: ^1.0.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
  test_api: ^0.7.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_static: ^1.1.2
  stream_channel: ^2.1.2
  fake_async: ^1.3.3
  bson: ^5.0.7
  test_descriptor: ^2.0.2
  mockito: ^5.5.0
  yaml: ^3.1.3
  vm_service: ^15.2.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
